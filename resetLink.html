<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password - JobsHunt</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="./assets/css/bootstrap.css">
<link rel="stylesheet" href="./assets/css/style.css">

</head>

<body>

<section class="login-main-section d-flex align-items-center justify-content-center min-vh-100">

<div class="login-card glass-card z-3 rounded-5">

<h3 class="text-center text-white mb-4">Forgot Password</h3>

<form id="forgotForm">

<div id="message"></div>

<!-- STEP 1 -->
<div class="input-field">
<input type="email" id="email" required>
<label>Email</label>
</div>
<button class="btn btn-teal w-100 mt-3" id="actionBtn">
Continue
</button>

</form>

<div class="text-center text-white mt-3">
<a href="loginForm.html">Back to Login</a>
</div>

</div>

</section>

<script src="./assets/js/auth.js"></script>

<script>


        document.getElementById("forgotForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const email = document.getElementById("email").value;

            const response = await fetch("http://192.168.1.3:8080/api/auth/forgot-password", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({email:email})
            });

            const result = await response.text();
            document.getElementById("message").innerText = result;
        });
 
</script>

</body>
</html>
