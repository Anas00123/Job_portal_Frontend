<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recruiter Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="/assets/css/bootstrap.css" rel="stylesheet">
    <link href="/assets/css/style.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div id="recruiter-sidebar"></div>
<div class="overlay" id="overlay"></div>

<div class="main-content">

    <!-- Top Navbar -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="mb-0 text-blue-color">Dashboard</h5>

        <div class="d-flex align-items-center gap-3">
            <i class="bi bi-bell fs-5 text-muted"></i>

            <div class="dropdown">
                <a class="d-flex align-items-center text-dark text-decoration-none dropdown-toggle"
                   href="#" data-bs-toggle="dropdown">
                   
                    <strong id="recruiterName">Loading...</strong>
                </a>
                <ul class="dropdown-menu dropdown-menu-end shadow">
                    <li><a class="dropdown-item text-danger" href="#" id="logoutBtn">Logout</a></li>
                </ul>
            </div>
        </div>
    </div>

    <!-- KPI Cards -->
    <div class="row g-4 mb-4">

        <div class="col-md-3 col-6">
            <div class="card shadow-sm border-0 rounded-4 p-4">
                <small class="text-muted">Active Jobs</small>
                <h2 id="activeJobsCount" class="fw-bold text-success">0</h2>
            </div>
        </div>

        <div class="col-md-3 col-6">
            <div class="card shadow-sm border-0 rounded-4 p-4">
                <small class="text-muted">Total Jobs</small>
                <h2 id="totalJobsCount" class="fw-bold text-cyan-color">0</h2>
            </div>
        </div>

        <div class="col-md-3 col-6">
            <div class="card shadow-sm border-0 rounded-4 p-4">
                <small class="text-muted">Closed Jobs</small>
                <h2 id="closedJobsCount" class="fw-bold text-danger">0</h2>
            </div>
        </div>

        <!-- <div class="col-md-3 col-6">
            <div class="card shadow-sm border-0 rounded-4 p-4">
                <small class="text-muted">This Month</small>
                <h2 id="monthlyJobsCount" class="fw-bold text-success">0</h2>
            </div>
        </div> -->

    </div>

    <!-- Chart -->
    <div class="card shadow-sm border-0 rounded-4 p-4 mb-4">
        <h6 class="text-blue-color mb-3">Job Overview</h6>
        <canvas id="jobChart" height="100"></canvas>
    </div>

    <!-- Recent Jobs -->
    <div class="card shadow-sm border-0 rounded-4 p-4">
        <h6 class="text-blue-color mb-3">Recent Jobs</h6>

        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th>Title</th>
                    <th>Category</th>
                    <th>Location</th>
                    <th>Status</th>
                    <th>Created</th>
                </tr>
                </thead>
                <tbody id="recentJobsBody"></tbody>
            </table>
        </div>
    </div>

</div>
<script src="../../config.js"></script>
<script src="../../assets/js/recruiterDashboard/jobCount.js"></script>
<script src="/assets/js/bootstrap.js"></script>
<script src="/assets/js/auth.js"></script>
<script>
    protectPage(["RECRUITER"]);
</script>
<script src="/assets/js/recruiterDashboard/recruiterSidebar.js"></script>
<script src="/assets/js/recruiterDashboard/dashboard.js"></script>
    
</body>
</html>
