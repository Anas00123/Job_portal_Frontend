<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Manage Jobs | Recruiter Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="/assets/css/bootstrap.css" rel="stylesheet">
    <link href="/assets/css/style.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

</head>

<body>

    <div id="recruiter-sidebar"></div>

    <div class="main-content">

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold text-blue-color">Manage Jobs</h4>
            <a href="/recruiter/recruiterDashboard/jobPost.html" class="btn btn-outline-teal">
                <i class="bi bi-plus-circle me-1"></i> Post New Job
            </a>
        </div>

        <!-- Stats -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="dashboard-card">
                    <h6>Total Jobs</h6>
                    <h3 id="totalJobsCount">0</h3>
                </div>
            </div>
            <div class="col-md-3">
                <div class="dashboard-card">
                    <h6>Active Jobs</h6>
                    <h3 id="activeJobsCount" class="text-success">0</h3>
                </div>
            </div>
            <div class="col-md-3">
                <div class="dashboard-card">
                    <h6>Closed Jobs</h6>
                    <h3 id="closedJobsCount" class="text-danger">0</h3>
                </div>
            </div>
        </div>

        <!-- Jobs Table -->
        <div class="card shadow-sm p-3">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="bg-blue-color text-white">
                        <tr>
                            <th>#</th>
                            <th>Title</th>
                            <th>Location</th>
                            <th>Status</th>
                            <th width="180">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="jobsTableBody"></tbody>
                </table>
            </div>
        </div>
        <div class="d-flex justify-content-center mt-3">
            <button class="btn btn-sm btn-outline-primary me-2" onclick="prevPage()">Prev</button>
            <button class="btn btn-sm btn-outline-primary" onclick="nextPage()">Next</button>
        </div>
    </div>


    <!-- Edit Job Modal -->
    <div class="modal fade" id="editJobModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content rounded-4 shadow">

                <div class="modal-header">
                    <h5 class="modal-title">Edit Job</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <input type="hidden" id="editJobId">
                    <input type="hidden" id="editCompanyId">

                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input type="text" id="editTitle" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Location</label>
                        <input type="text" id="editLocation" class="form-control">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Job Description</label>

                        <div id="editDescription" style="height: 200px;"></div>

                    </div>


                    <!-- <div class="mb-3">
                    <label class="form-label">Status</label>
                    <select id="editStatus" class="form-select">
                        <option value="OPEN">OPEN</option>
                        <option value="CLOSED">CLOSED</option>
                    </select>
                </div> -->
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary" onclick="updateJob()">Save Changes</button>
                </div>

            </div>
        </div>
    </div>
    <script src="../../config.js"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script>
        const quill = new Quill('#editDescription', {
            theme: 'snow',
            placeholder: 'Write job Description...',
            modules: {
                toolbar: [
                    ['bold', 'italic', 'underline'],
                    [{ 'header': [1, 2, 3, false] }],
                    [{ 'list': 'ordered' }, { 'list': 'bullet' }],
                    ['clean']
                ]
            }
        });


    </script>
    <script src="/assets/js/recruiterDashboard/jobCount.js"></script>
    <script src="/assets/js/bootstrap.js"></script>
    <script>
        loadJobCounts();
    </script>
    <script src="/assets/js/recruiterDashboard/recruiterSidebar.js"></script>
    <script src="/assets/js/recruiterDashboard/manageJobs.js"></script>

</body>

</html>
