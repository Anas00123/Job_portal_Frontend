<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Recruiter - Offers</title>
    <link rel="stylesheet" href="/assets/css/bootstrap.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6fa;
        }

        .wrapper {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: #091d33;
            color: #fff;
            transition: .3s;
        }

        .sidebar .nav-link {
            color: #cbd5e1;
            padding: 12px 20px;
        }

        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            background: #122c4f;
            border-left: 4px solid #18a99c;
            color: #fff;
        }

        .content {
            flex-grow: 1;
            padding: 25px;
        }

        .btn-teal {
            background: #18a99c;
            border-color: #18a99c;
            color: #fff;
        }

        .btn-teal:hover {
            background: #149488;
            border-color: #149488;
        }

        @media(max-width:991px) {
            .sidebar {
                position: fixed;
                left: -250px;
                top: 0;
                height: 100%;
                z-index: 1050;
            }

            .sidebar.show {
                left: 0;
            }

            .overlay {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, .4);
                display: none;
            }

            .overlay.show {
                display: block;
            }
        }

        @media(max-width:576px) {
            .content {
                padding: 15px;
            }

            .table thead {
                display: none;
            }

            .table tr {
                display: block;
                background: #fff;
                margin-bottom: 15px;
                border-radius: 10px;
                padding: 10px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            }

            .table td {
                display: flex;
                justify-content: space-between;
                border: none;
                font-size: 13px;
                padding: 6px 0;
            }

            .table td::before {
                content: attr(data-label);
                font-weight: 600;
            }
             #toggleBtn {
                width: 50px;
                /* increase width */
                height: 40px;
                /* optional: adjust height */
                display: flex;
                align-items: center;
                justify-content: center;
            }
            #toggleBtn:hover{
                
                   background-color: #18a99c;
                   border-color: #18a99c;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar bg-white shadow-sm px-3">
        <div class="container-fluid d-flex justify-content-between">
            <div class="d-flex align-items-center">
                <button class="btn btn-outline-dark d-lg-none me-3" id="toggleBtn">
                    <i class="bi bi-list fs-4"></i>
                </button>
                <span class="navbar-brand h5 mb-0">Offers</span>
            </div>
            <button class="btn btn-teal"><i class="bi bi-plus-lg"></i> Create Offer</button>
        </div>
    </nav>

    <div class="wrapper">
        <div class="sidebar p-3" id="sidebar">
            <h5 class="text-white mb-4">Recruiter Panel</h5>
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="jobs.html">Jobs</a></li>
                <li class="nav-item"><a class="nav-link" href="applications.html">Applications</a></li>
                <li class="nav-item"><a class="nav-link" href="interviews.html">Interviews</a></li>
                <li class="nav-item"><a class="nav-link active" href="#">Offers</a></li>
                <li class="nav-item"><a class="nav-link" href="reports.html">Reports</a></li>
                <li class="nav-item"><a class="nav-link" href="settings.html">Settings</a></li>
            </ul>
        </div>

        <div class="overlay" id="overlay"></div>

        <div class="content">
            <div class="card shadow-sm p-4">
                <h6 class="mb-3">Offer List</h6>
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                            <tr>
                                <th>Candidate</th>
                                <th>Position</th>
                                <th>Salary</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td data-label="Candidate">Rohit Singh</td>
                                <td data-label="Position">UI Developer</td>
                                <td data-label="Salary">₹6 LPA</td>
                                <td data-label="Status"><span class="badge bg-success">Accepted</span></td>
                                <td data-label="Action"><button class="btn btn-sm btn-outline-primary">View</button>
                                </td>
                            </tr>
                            <tr>
                                <td data-label="Candidate">Neha Verma</td>
                                <td data-label="Position">Backend Developer</td>
                                <td data-label="Salary">₹8 LPA</td>
                                <td data-label="Status"><span class="badge bg-warning text-dark">Pending</span></td>
                                <td data-label="Action"><button class="btn btn-sm btn-outline-danger">Withdraw</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="../../config.js"></script>

    <script>
        document.getElementById("toggleBtn").onclick = function () {
            sidebar.classList.toggle("show");
            overlay.classList.toggle("show");
        }
        overlay.onclick = function () {
            sidebar.classList.remove("show");
            overlay.classList.remove("show");
        }
    </script>
</body>

</html>
