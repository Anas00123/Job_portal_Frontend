<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Forgot Password - JobsHunt</title>

    <link rel="stylesheet" href="/assets/css/bootstrap.css">

    <link rel="stylesheet" href="./assets/css/bootstrap.css">
    <link rel="stylesheet" href="./assets/css/style.css">

</head>

<body>

    <section class="login-main-section d-flex align-items-center justify-content-center min-vh-100">

        <div class="login-card glass-card z-3 rounded-5">

            <h3 class="text-center text-white mb-4">Forgot Password</h3>
            <form id="resetForm">

                <div id="message" class="text-white"></div>

                <!-- New Password -->
                <div class="input-field">
                    <input type="password" id="newPassword" required>
                    <label>New Password</label>
                </div>
                <div id="passwordError" class="text-danger small mb-2"></div>

                <!-- Confirm Password -->
                <div class="input-field mt-3">
                    <input type="password" id="confirmPassword" required>
                    <label>Confirm Password</label>
                </div>
                <div id="confirmError" class="text-danger small mb-2"></div>

                <button class="btn btn-teal w-100 mt-3" id="actionBtn">
                    Reset Password
                </button>

            </form>
        </div>

    </section>

    <script src="config.js"></script>
    <script src="assets/js/pages/resetPassword.js"></script>

</body>

</html>
