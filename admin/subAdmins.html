<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sub Admins - Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="icon" type="image/png" href="/assets/images/tab-logo1.png">
    <style>
        body { background:#f4f6fb; font-family:'Segoe UI',sans-serif; margin:0; }
        .page-hero { background:linear-gradient(135deg,#0b2239 0%,#1a3a5c 100%); border-radius:16px; padding:28px 32px; margin-bottom:24px; color:white; }
        .page-hero h4 { font-weight:700; margin:0 0 4px; }
        .page-hero p { color:rgba(255,255,255,0.6); font-size:14px; margin:0; }
        .stat-card { background:white; border-radius:14px; padding:20px; border:1px solid #e5e7eb; transition:all .2s; }
        .stat-card:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,0.08); }
        .stat-value { font-size:28px; font-weight:700; }
        .stat-label { font-size:12.5px; color:#64748b; margin-top:4px; }
        .stat-icon { width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px; }
        .table-card { background:white; border-radius:14px; border:1px solid #e5e7eb; overflow:hidden; }
        .table-card-header { padding:16px 20px; border-bottom:1px solid #f1f5f9; display:flex; justify-content:space-between; align-items:center; }
        .table-card-title { font-size:14px; font-weight:600; }
        .btn-teal { background:#0d9488; color:white; border:none; }
        .btn-teal:hover { background:#0f766e; color:white; }
        /* Profile Modal */
        .profile-modal-avatar { width:52px; height:52px; border-radius:50%; background:#0d9488; color:white; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:18px; flex-shrink:0; }
        /* Sub Admin Restricted */
        .sub-admin-block { background:#fef2f2; border:1px solid #fecaca; border-radius:14px; padding:40px; text-align:center; }
    </style>
</head>
<body>

<!-- Mobile Topbar -->
<div class="mobile-topbar">
    <button class="mobile-menu-btn" onclick="openSidebar()"><i class="bi bi-list"></i></button>
    <span id="mobileBrand" style="color:white;font-weight:700;font-size:16px;">JobsHunt</span>
    <div style="width:24px;"></div>
</div>
<div class="mobile-overlay" id="mobileOverlay" onclick="closeSidebar()"></div>
<div class="sidebar" id="sidebar"></div>
<div class="spinner-overlay" id="spinnerOverlay"><div class="spinner-border text-primary"></div></div>

<div class="main-content">
    <!-- Topbar -->
    <div class="topbar">
        <div class="topbar-left">
            <h4>Sub Admins</h4>
            <small>Manage sub administrator accounts</small>
        </div>
        <div class="topbar-right">
            <div id="subAdminNotice" style="display:none;">
                <span class="badge bg-warning text-dark px-3 py-2" style="font-size:12px;">
                    <i class="bi bi-shield-exclamation me-1"></i> Sub Admin Mode
                </span>
            </div>
            <button class="topbar-btn" onclick="openProfileModal()">
                <i class="bi bi-person-circle"></i>
                <span id="adminNameTop">Admin</span>
            </button>
        </div>
    </div>

    <div class="content" id="mainContent">
        <!-- Content rendered by JS based on role -->
    </div>
</div>

<!-- ── CREATE MODAL ── -->
<div class="modal fade" id="createModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header" style="background:#0b2239;">
                <h5 class="modal-title text-white"><i class="bi bi-person-plus me-2"></i>Create Sub Admin</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form onsubmit="return false;">
                <div class="modal-body">
                    <div class="alert alert-danger d-none" id="createError"></div>
                    <div class="mb-3"><label class="form-label fw-semibold">Full Name <span class="text-danger">*</span></label><input type="text" class="form-control" id="c_fullname"/></div>
                    <div class="mb-3"><label class="form-label fw-semibold">Username <span class="text-danger">*</span></label><input type="text" class="form-control" id="c_username"/></div>
                    <div class="mb-3"><label class="form-label fw-semibold">Email <span class="text-danger">*</span></label><input type="email" class="form-control" id="c_email"/></div>
                    <div class="mb-3"><label class="form-label fw-semibold">Phone</label><input type="number" class="form-control" id="c_phone"/></div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Password <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="c_password"/>
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePw('c_password',this)"><i class="bi bi-eye"></i></button>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-teal" id="createBtn" type="button" onclick="createSubAdmin()">
                        <span id="createBtnText">Create</span>
                        <span id="createSpinner" class="spinner-border spinner-border-sm d-none"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- ── EDIT MODAL ── -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header" style="background:#0b2239;">
                <h5 class="modal-title text-white"><i class="bi bi-pencil-square me-2"></i>Edit Sub Admin</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="alert alert-danger d-none" id="editError"></div>
                <input type="hidden" id="e_id"/>
                <div class="mb-3"><label class="form-label fw-semibold">Full Name</label><input type="text" class="form-control" id="e_fullname"/></div>
                <div class="mb-3"><label class="form-label fw-semibold">Username</label><input type="text" class="form-control" id="e_username"/></div>
                <div class="mb-3"><label class="form-label fw-semibold">Email</label><input type="email" class="form-control" id="e_email"/></div>
                <div class="mb-3"><label class="form-label fw-semibold">Phone</label><input type="number" class="form-control" id="e_phone"/></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary" onclick="updateSubAdmin()">
                    <span id="editBtnText">Save Changes</span>
                    <span id="editSpinner" class="spinner-border spinner-border-sm d-none"></span>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- ── PROFILE MODAL ── -->
<div class="modal fade" id="profileModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header" style="background:#0b2239;">
                <h5 class="modal-title text-white"><i class="bi bi-person-circle me-2"></i>My Profile</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="d-flex align-items-center gap-3 mb-4 p-3 rounded" style="background:#f8fafc;">
                    <div class="profile-modal-avatar" id="profileAvatarModal">A</div>
                    <div>
                        <h5 class="mb-1" id="profileDisplayName">--</h5>
                        <p class="text-muted mb-1 small" id="profileDisplayEmail">--</p>
                        <span class="badge" id="profileDisplayRole" style="background:#0b2239;">--</span>
                    </div>
                </div>
                <ul class="nav nav-tabs mb-3" id="profileTabs">
                    <li class="nav-item"><a class="nav-link active" href="#" onclick="switchProfileTab('editProfile',this);return false;"><i class="bi bi-pencil me-1"></i>Edit Profile</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="switchProfileTab('changePassword',this);return false;"><i class="bi bi-lock me-1"></i>Change Password</a></li>
                </ul>
                <div id="tab_editProfile">
                    <div class="alert alert-success d-none" id="editProfileSuccess">Profile updated!</div>
                    <div class="alert alert-danger d-none" id="editProfileError"></div>
                    <div class="row g-3">
                        <div class="col-md-6"><label class="form-label fw-semibold">Full Name</label><input type="text" class="form-control" id="p_fullname"/></div>
                        <div class="col-md-6"><label class="form-label fw-semibold">Username</label><input type="text" class="form-control" id="p_username"/></div>
                        <div class="col-md-6"><label class="form-label fw-semibold">Email</label><input type="email" class="form-control" id="p_email" disabled/><small class="text-muted">Cannot be changed</small></div>
                        <div class="col-md-6"><label class="form-label fw-semibold">Phone</label><input type="number" class="form-control" id="p_phone"/></div>
                    </div>
                    <div class="mt-3 text-end">
                        <button class="btn btn-success" onclick="saveProfile()">
                            <span id="saveProfileText">Save Changes</span>
                            <span id="saveProfileSpinner" class="spinner-border spinner-border-sm d-none"></span>
                        </button>
                    </div>
                </div>
                <div id="tab_changePassword" style="display:none;">
                    <div class="alert alert-success d-none" id="changePwSuccess">Password changed!</div>
                    <div class="alert alert-danger d-none" id="changePwError"></div>
                    <div class="mb-3"><label class="form-label fw-semibold">Current Password</label><div class="input-group"><input type="password" class="form-control" id="p_currentPw" placeholder="Current password"/><button class="btn btn-outline-secondary" type="button" onclick="togglePw('p_currentPw',this)"><i class="bi bi-eye"></i></button></div></div>
                    <div class="mb-3"><label class="form-label fw-semibold">New Password</label><div class="input-group"><input type="password" class="form-control" id="p_newPw" placeholder="New password"/><button class="btn btn-outline-secondary" type="button" onclick="togglePw('p_newPw',this)"><i class="bi bi-eye"></i></button></div></div>
                    <div class="mb-3"><label class="form-label fw-semibold">Confirm Password</label><div class="input-group"><input type="password" class="form-control" id="p_confirmPw" placeholder="Confirm password"/><button class="btn btn-outline-secondary" type="button" onclick="togglePw('p_confirmPw',this)"><i class="bi bi-eye"></i></button></div></div>
                    <div class="text-end"><button class="btn btn-warning" onclick="changePassword()"><span id="changePwText">Change Password</span><span id="changePwSpinner" class="spinner-border spinner-border-sm d-none"></span></button></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../config.js"></script>
<script src="/assets/js/adminSidepanel/adminsidebar.js"></script>
<script>
    window._activePage = "subadmins";
    protectAdminPage();

    const ROLE = localStorage.getItem("role") || "ADMIN";
    const IS_SUB_ADMIN = ROLE === "SUB_ADMIN";

    document.addEventListener("DOMContentLoaded", () => {
        renderAdminSidebar("subadmins");
        if (IS_SUB_ADMIN) {
            renderRestrictedPage();
        } else {
            renderSubAdminPage();
            loadSubAdmins();
        }
    });

    function renderRestrictedPage() {
        document.getElementById("mainContent").innerHTML = `
            <div class="sub-admin-block">
                <i class="bi bi-shield-lock-fill" style="font-size:48px;color:#dc2626;display:block;margin-bottom:16px;"></i>
                <h5 style="font-weight:700;color:#0f172a;">Access Restricted</h5>
                <p style="color:#64748b;margin-bottom:24px;">Sub Admins cannot access this section.<br>Only Administrators can manage sub-admin accounts.</p>
                <a href="dashboard.html" class="btn btn-secondary px-4">
                    <i class="bi bi-arrow-left me-2"></i> Back to Dashboard
                </a>
            </div>`;
    }

    function renderSubAdminPage() {
        document.getElementById("mainContent").innerHTML = `
            <div class="page-hero">
                <h4><i class="bi bi-shield-lock me-2"></i>Sub Admins</h4>
                <p>Manage sub administrator accounts and permissions</p>
            </div>
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="stat-card">
                        <div class="d-flex justify-content-between align-items-start">
                            <div><div class="stat-label">Total Sub Admins</div><div class="stat-value" id="totalSubAdmins">--</div></div>
                            <div class="stat-icon" style="background:#eff6ff;color:#3b82f6;"><i class="bi bi-shield-fill"></i></div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card">
                        <div class="d-flex justify-content-between align-items-start">
                            <div><div class="stat-label">Active</div><div class="stat-value text-success" id="activeSubAdmins">--</div></div>
                            <div class="stat-icon" style="background:#f0fdf4;color:#22c55e;"><i class="bi bi-check-circle-fill"></i></div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card">
                        <div class="d-flex justify-content-between align-items-start">
                            <div><div class="stat-label">Inactive / Pending</div><div class="stat-value text-warning" id="inactiveSubAdmins">--</div></div>
                            <div class="stat-icon" style="background:#fffbeb;color:#f59e0b;"><i class="bi bi-hourglass-split"></i></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="table-card">
                <div class="table-card-header">
                    <span class="table-card-title"><i class="bi bi-shield-lock me-2" style="color:#0d9488;"></i>All Sub Admins</span>
                    <button class="btn btn-teal btn-sm" onclick="openCreateModal()">
                        <i class="bi bi-plus-circle me-1"></i> Add Sub Admin
                    </button>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0" style="font-size:13.5px;">
                        <thead style="background:#f8fafc;">
                            <tr>
                                <th style="padding:12px 16px;color:#64748b;font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">#</th>
                                <th style="padding:12px 16px;color:#64748b;font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">Full Name</th>
                                <th style="padding:12px 16px;color:#64748b;font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">Username</th>
                                <th style="padding:12px 16px;color:#64748b;font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">Email</th>
                                <th style="padding:12px 16px;color:#64748b;font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">Phone</th>
                                <th style="padding:12px 16px;color:#64748b;font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">Status</th>
                                <th style="padding:12px 16px;color:#64748b;font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">Registered</th>
                                <th style="padding:12px 16px;color:#64748b;font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="subAdminTableBody">
                            <tr><td colspan="8" style="text-align:center;padding:32px;color:#94a3b8;">
                                <div class="spinner-border spinner-border-sm text-primary me-2"></div>Loading...
                            </td></tr>
                        </tbody>
                    </table>
                </div>
            </div>`;
    }

    function showSpinner() { document.getElementById("spinnerOverlay").classList.add("show"); }
    function hideSpinner() { document.getElementById("spinnerOverlay").classList.remove("show"); }

    function showToast(message, type = "success") {
        const wrapper = document.createElement("div");
        wrapper.style.cssText = "position:fixed;bottom:20px;right:20px;z-index:9999;min-width:280px;";
        wrapper.innerHTML = `<div class="toast show align-items-center text-white bg-${type} border-0 shadow">
            <div class="d-flex"><div class="toast-body fw-semibold">${message}</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" onclick="this.closest('div[style]').remove()"></button></div></div>`;
        document.body.appendChild(wrapper);
        setTimeout(() => wrapper.remove(), 3500);
    }

    function getUserStatusBadge(status) {
        const map = { "ACTIVE":"success", "PENDING":"warning text-dark", "INACTIVE":"secondary", "SUSPENDED":"danger" };
        return `<span class="badge bg-${map[status]||"secondary"}">${status||"N/A"}</span>`;
    }

    function formatDate(d) {
        return d ? new Date(d).toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"}) : "N/A";
    }

    async function loadSubAdmins() {
        showSpinner();
        try {
            const res = await fetchWithRefresh(`${API_BASE_URL}/admin/sub-admins`);
            if (!res.ok) throw new Error(`Server error: ${res.status}`);
            const raw = await res.json();
            const data = Array.isArray(raw) ? raw : (raw.content || []);

            document.getElementById("totalSubAdmins").innerText = data.length;
            document.getElementById("activeSubAdmins").innerText = data.filter(s => s.userStatus === "ACTIVE").length;
            document.getElementById("inactiveSubAdmins").innerText = data.filter(s => s.userStatus !== "ACTIVE").length;

            const tbody = document.getElementById("subAdminTableBody");
            if (!data.length) {
                tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:40px;color:#94a3b8;">
                    <i class="bi bi-inbox" style="font-size:32px;display:block;margin-bottom:8px;"></i>No sub-admins found
                </td></tr>`;
                return;
            }

            tbody.innerHTML = data.map((sa, i) => `
                <tr>
                    <td style="padding:12px 16px;color:#64748b;">${i+1}</td>
                    <td style="padding:12px 16px;font-weight:600;">${sa.fullName??"N/A"}</td>
                    <td style="padding:12px 16px;color:#64748b;">${sa.username??"N/A"}</td>
                    <td style="padding:12px 16px;color:#64748b;">${sa.email??"N/A"}</td>
                    <td style="padding:12px 16px;color:#64748b;">${sa.phone??"N/A"}</td>
                    <td style="padding:12px 16px;">${getUserStatusBadge(sa.userStatus)}</td>
                    <td style="padding:12px 16px;color:#94a3b8;font-size:12.5px;">${formatDate(sa.createdAt)}</td>
                    <td style="padding:12px 16px;">
                        <div class="d-flex gap-1 flex-wrap">
                            <button class="btn btn-sm btn-outline-success" onclick="activateSubAdmin(${sa.userId})" ${sa.userStatus==="ACTIVE"?"disabled":""}>
                                <i class="bi bi-check-circle"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-warning" onclick="deactivateSubAdmin(${sa.userId})" ${sa.userStatus==="INACTIVE"?"disabled":""}>
                                <i class="bi bi-slash-circle"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-primary" onclick="openEditModal(${sa.userId},'${(sa.fullName||"").replace(/'/g,"\\'")}','${(sa.username||"").replace(/'/g,"\\'")}','${(sa.email||"").replace(/'/g,"\\'")}','${sa.phone||""}')">
                                <i class="bi bi-pencil"></i>
                            </button>
                        </div>
                    </td>
                </tr>`).join("");
        } catch(err) {
            console.error(err);
            document.getElementById("subAdminTableBody").innerHTML = `<tr><td colspan="8" style="text-align:center;color:#dc2626;padding:32px;">Failed to load. Please refresh.</td></tr>`;
        } finally { hideSpinner(); }
    }

    function openCreateModal() {
        ["c_fullname","c_username","c_email","c_phone","c_password"].forEach(id => document.getElementById(id).value="");
        document.getElementById("createError").classList.add("d-none");
        new bootstrap.Modal(document.getElementById("createModal")).show();
    }

    async function createSubAdmin() {
        const fullname=document.getElementById("c_fullname").value.trim();
        const username=document.getElementById("c_username").value.trim();
        const email=document.getElementById("c_email").value.trim();
        const phone=document.getElementById("c_phone").value.trim();
        const password=document.getElementById("c_password").value;
        const errorEl=document.getElementById("createError");
        errorEl.classList.add("d-none");
        if (!fullname||!username||!email||!password) { errorEl.innerText="Please fill all required fields."; errorEl.classList.remove("d-none"); return; }
        const btn=document.getElementById("createBtn"); const btnText=document.getElementById("createBtnText"); const spinner=document.getElementById("createSpinner");
        btn.disabled=true; btnText.innerText="Creating..."; spinner.classList.remove("d-none");
        try {
            const res=await fetchWithRefresh(`${API_BASE_URL}/admin/sub-admins`,{method:"POST",body:JSON.stringify({fullname,username,email,password,phone:phone?Number(phone):null})});
            if (!res.ok) { const err=await res.json(); throw new Error(err.message||"Failed"); }
            bootstrap.Modal.getInstance(document.getElementById("createModal")).hide();
            loadSubAdmins();
            showToast("Sub-admin created successfully ✓");
        } catch(err) { errorEl.innerText=err.message||"Failed."; errorEl.classList.remove("d-none"); }
        finally { btn.disabled=false; btnText.innerText="Create"; spinner.classList.add("d-none"); }
    }

    function openEditModal(id,fullname,username,email,phone) {
        document.getElementById("e_id").value=id;
        document.getElementById("e_fullname").value=fullname;
        document.getElementById("e_username").value=username;
        document.getElementById("e_email").value=email;
        document.getElementById("e_phone").value=phone;
        document.getElementById("editError").classList.add("d-none");
        new bootstrap.Modal(document.getElementById("editModal")).show();
    }

    async function updateSubAdmin() {
        const id=document.getElementById("e_id").value;
        const fullname=document.getElementById("e_fullname").value.trim();
        const username=document.getElementById("e_username").value.trim();
        const email=document.getElementById("e_email").value.trim();
        const phone=document.getElementById("e_phone").value.trim();
        const errorEl=document.getElementById("editError");
        errorEl.classList.add("d-none");
        document.getElementById("editBtnText").innerText="Saving...";
        document.getElementById("editSpinner").classList.remove("d-none");
        try {
            const res=await fetchWithRefresh(`${API_BASE_URL}/admin/sub-admins/${id}`,{method:"PUT",body:JSON.stringify({fullname,username,email,phone:phone?Number(phone):null})});
            if (!res.ok) { const err=await res.json(); throw new Error(err.message||"Failed"); }
            bootstrap.Modal.getInstance(document.getElementById("editModal")).hide();
            loadSubAdmins();
            showToast("Sub-admin updated ✓");
        } catch(err) { errorEl.innerText=err.message||"Failed."; errorEl.classList.remove("d-none"); }
        finally { document.getElementById("editBtnText").innerText="Save Changes"; document.getElementById("editSpinner").classList.add("d-none"); }
    }

    async function activateSubAdmin(id) {
        if (!confirm("Activate this sub-admin?")) return;
        try {
            const res=await fetchWithRefresh(`${API_BASE_URL}/admin/sub-admins/${id}/activate`,{method:"PATCH",body:JSON.stringify({status:"ACTIVE"})});
            if (!res.ok) throw new Error();
            loadSubAdmins(); showToast("Sub-admin activated ✓");
        } catch { showToast("Failed to activate","danger"); }
    }

    async function deactivateSubAdmin(id) {
        if (!confirm("Deactivate this sub-admin?")) return;
        try {
            const res=await fetchWithRefresh(`${API_BASE_URL}/admin/sub-admins/${id}/deactivate`,{method:"PATCH",body:JSON.stringify({status:"INACTIVE"})});
            if (!res.ok) throw new Error();
            loadSubAdmins(); showToast("Sub-admin deactivated","warning");
        } catch { showToast("Failed to deactivate","danger"); }
    }
</script>
</body>
</html>
