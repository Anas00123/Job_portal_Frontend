<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Job Portal</title>
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #0b2239;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #fff;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .3);
        }

        .login-card h3 {
            color: #0b2239;
            font-weight: 700;
        }

        .btn-login {
            background-color: #18a99c;
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 10px;
        }

        .btn-login:hover {
            background-color: #148f84;
            color: #fff;
        }

        .input-group-text {
            background-color: #f0f0f0;
            border-right: none;
        }

        .form-control {
            border-left: none;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #ced4da;
        }

        #errorAlert {
            display: none;
        }

        .spinner-border {
            width: 1.2rem;
            height: 1.2rem;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="text-center mb-4">
            <i class="bi bi-briefcase-fill fs-1 text-success"></i>
            <h3 class="mt-2">Job Portal</h3>
            <p class="text-muted small">Sign in to your Admin account</p>
        </div>

        <div class="alert alert-danger" id="errorAlert" role="alert">
            <i class="bi bi-exclamation-triangle me-2"></i>
            <span id="errorMessage">Invalid credentials.</span>
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" class="form-control" id="email" placeholder="admin@jobportal.com"
                    autocomplete="email" />
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" class="form-control" id="password" placeholder="Enter your password"
                    autocomplete="current-password" />
                <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                    <i class="bi bi-eye" id="eyeIcon"></i>
                </button>
            </div>
        </div>

        <button class="btn btn-login w-100" id="loginBtn" onclick="login()">
            <span id="loginBtnText">Sign In</span>
            <span id="loginSpinner" class="spinner-border ms-2 d-none" role="status"></span>
        </button>
    </div>

    <!-- config.js MUST load first -->
    <script src="../config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ── Redirect if already logged in ──
        if (isLoggedIn() && isAdmin()) {
            window.location.href = "dashboard.html";
        }

        // ── Toggle password visibility ──
        document.getElementById("togglePassword").addEventListener("click", function () {
            const input = document.getElementById("password");
            const icon = document.getElementById("eyeIcon");
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("bi-eye", "bi-eye-slash");
            } else {
                input.type = "password";
                icon.classList.replace("bi-eye-slash", "bi-eye");
            }
        });

        // ── Enter key support ──
        ["email", "password"].forEach(id => {
            document.getElementById(id)
                .addEventListener("keydown", e => { if (e.key === "Enter") login(); });
        });

        // ── UI helpers ──
        function showError(msg) {
            document.getElementById("errorMessage").innerText = msg;
            document.getElementById("errorAlert").style.display = "block";
        }
        function hideError() {
            document.getElementById("errorAlert").style.display = "none";
        }
        function setLoading(loading) {
            document.getElementById("loginBtn").disabled = loading;
            document.getElementById("loginBtnText").innerText = loading ? "Signing in..." : "Sign In";
            document.getElementById("loginSpinner").classList.toggle("d-none", !loading);
        }

        // ── Login ──
        async function login() {
            hideError();

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;

            if (!email || !password) {
                showError("Please enter both email and password.");
                return;
            }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showError("Please enter a valid email address.");
                return;
            }

            setLoading(true);
            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: "POST",
                    credentials: "include",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ usernameOrEmail: email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    showError(data.message || "Invalid email or password.");
                    return;
                }

                const role = data.role || "";

                if (role === "ADMIN" || role === "SUB_ADMIN") {
                    //  Cookie is set by server — just store display info
                    localStorage.setItem("loggedIn", "true");
                    localStorage.setItem("role", role);
                    localStorage.setItem("fullName", data.username || "Admin");
                    localStorage.setItem("email", data.email || "");
                    localStorage.setItem("userId", data.userId || "");
                    window.location.href = "dashboard.html";
                } else {
                    showError("Access denied. Admins only.");
                }

            } catch (err) {
                console.error("Login error:", err);
                showError("Something went wrong. Please try again.");
            } finally {
                setLoading(false);
            }
        }
    </script>
</body>

</html>
