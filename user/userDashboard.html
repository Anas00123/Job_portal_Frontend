    <style>
        /* ── Search Bar ── */
        .jobs-search-bar {
            display: flex;
            gap: 8px;
            align-items: center;
            background: #fff;
            border: 1.5px solid #e5e7eb;
            border-radius: 12px;
            padding: 8px 12px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .05);
            flex-wrap: wrap;
        }

        .search-field {
            display: flex;
            align-items: center;
            flex: 1;
            min-width: 120px;
            border-right: 1.5px solid #f0f0f0;
            padding-right: 10px;
        }

        .search-field:last-of-type {
            border-right: none;
        }

        .search-icon {
            color: #9ca3af;
            font-size: 14px;
            margin-right: 7px;
            flex-shrink: 0;
        }

        .search-field input {
            border: none;
            outline: none;
            font-size: 13.5px;
            color: #374151;
            width: 100%;
            background: transparent;
        }

        .search-field input::placeholder {
            color: #b0b7c3;
        }

        .search-clear-btn {
            background: #f3f4f6;
            border: none;
            border-radius: 8px;
            padding: 6px 10px;
            color: #6b7280;
            cursor: pointer;
            font-size: 12px;
            transition: background.2s;
            flex-shrink: 0;
        }

        .search-clear-btn:hover {
            background: #fee2e2;
            color: #dc2626;
        }

        /* ── Active Filter Chips ── */
        .active-filters {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 8px;
            min-height: 0;
        }

        .filter-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #eff6ff;
            color: #1d4ed8;
            border: 1px solid #bfdbfe;
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 12px;
            font-weight: 500;
            animation: chipIn .2s ease;
        }

        .filter-chip button {
            background: none;
            border: none;
            color: #1d4ed8;
            cursor: pointer;
            padding: 0;
            font-size: 11px;
            line-height: 1;
        }

        @keyframes chipIn {
            from {
                opacity: 0;
                transform: scale(.85);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* ── Pagination ── */
        .jobs-pagination {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .jobs-pagination button {
            min-width: 36px;
            height: 36px;
            border: 1.5px solid #e5e7eb;
            background: #fff;
            border-radius: 8px;
            font-size: 13px;
            color: #374151;
            cursor: pointer;
            transition: all .18s;
        }

        .jobs-pagination button:hover {
            background: #eff6ff;
            border-color: #93c5fd;
        }

        .jobs-pagination button.active {
            background: #2563eb;
            color: #fff;
            border-color: #2563eb;
        }

        .jobs-pagination button:disabled {
            opacity: .4;
            cursor: not-allowed;
        }
    </style>

    <script>

        /* SIDEBAR */

        function openSidebar() {

            document.getElementById("sidebar").classList.add("active");
            document.getElementById("sidebarOverlay").classList.add("active");

        }

        function closeSidebar() {

            document.getElementById("sidebar").classList.remove("active");
            document.getElementById("sidebarOverlay").classList.remove("active");

        }



        /* SEARCH MODAL */

        function openSearchModal() {

            document.getElementById("searchOverlay").classList.add("active");

        }

        function outsideSearchClick(e) {

            if (e.target.id === "searchOverlay") {

                document.getElementById("searchOverlay").classList.remove("active");

            }

        }



        /* PROFILE DROPDOWN */

        function toggleProfileMenu(e) {

            e.stopPropagation();

            document
                .getElementById("profileDropdown")
                .classList.toggle("show");

        }


        /* CLOSE ON OUTSIDE CLICK */

        document.addEventListener("click", function () {

            document
                .getElementById("profileDropdown")
                .classList.remove("show");

        });


    </script>
