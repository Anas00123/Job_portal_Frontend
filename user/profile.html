<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>

    <link href="/assets/css/bootstrap.css" rel="stylesheet">
    <link href="/assets/css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/userHomeCss.css">
    <link rel="icon" type="image/png" href="/assets/images/tab-logo1.png">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css">


    <style>
        .avatar-lg {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: white;

            margin: auto;
            border: 4px solid rgba(255, 255, 255, .4);
        }







        .dashboard-card {
            transition: .25s;
        }

        .dashboard-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 18px rgba(0, 0, 0, .08);
        }

        .dashboard-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 10px rgba(0, 0, 0, .05);
        }

        .section-title {
            font-weight: 600;
        }

        .resume-display {
            background: #f5faff;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
        }

        .skill-badge {
            background: #e6f7f8;
            color: #00838f;
            padding: 6px 14px;
            border-radius: 20px;
            margin: 4px;
            display: inline-block;
        }
    </style>
</head>

<body>

    <div class=" container py-4">

        <div class="py-5 bg-cyan-color text-white text-center rounded-4 mb-4">

            <div class="">

                <!-- PROFILE IMAGE -->
                <div class=" mx-auto">

                    <div id="avatarBox" class="avatar-lg"></div>

                    <input type="file" id="profileImageInput" hidden>

                    <!-- EDIT BUTTON BELOW IMAGE -->
                    <button class="btn btn-light btn-sm mt-2" onclick="profileImageInput.click()">
                        <i class="bi bi-camera"></i>
                        Change Photo
                    </button>

                </div>

                <!-- USER INFO -->
                <h4 class="mt-3 mb-0" id="piName"></h4>
                <small id="piEmail"></small>

            </div>

        </div>
        <div class="dashboard-card mt-3">

            <div class="d-flex justify-content-between align-items-center">

                <h6 class="mb-0">
                    <i class="bi bi-geo-alt me-2"></i>
                    Address
                </h6>

                <button class="btn btn-sm btn-outline-teal" onclick="openAddressModal()">
                    Edit
                </button>

            </div>

            <div id="piAddress" class="text-muted mt-2">
                Not Added
            </div>

        </div>
        <!-- RIGHT PANEL -->
        <div class="row">
            <div class="col-lg-12">

                <!-- RESUME -->
                <div class="dashboard-card">
                    <div class="d-flex justify-content-between">
                        <h6>Resume</h6>
                        <input type="file" hidden id="resumeInput">
                        <button class="btn btn-sm btn-outline-teal" onclick="resumeInput.click()">
                            Upload
                        </button>
                    </div>

                    <div class="resume-display mt-3">
                        <span id="resumeName"></span>
                        <a id="downloadResume" target="_blank" class="btn btn-sm btn-teal">
                            Download
                        </a>
                    </div>
                </div>

                <!-- SKILLS -->
                <div class="dashboard-card">

                    <div class="d-flex justify-content-between">
                        <h6>Skills</h6>

                        <button class="btn btn-teal btn-sm" onclick="openSkillModal()">
                            + Add Skill
                        </button>
                    </div>

                    <div id="skillContainer" class="mt-3"></div>

                </div>
                <!-- EXPERIENCE -->
                <div class="dashboard-card">
                    <div class="d-flex justify-content-between">
                        <h6>Experience</h6>
                        <button class="btn btn-sm btn-teal" onclick="openExperienceModal()">Add</button>
                    </div>

                    <div id="experienceContainer"></div>
                </div>

                <!-- EDUCATION -->
                <div class="dashboard-card">
                    <div class="d-flex justify-content-between">
                        <h6>Education</h6>
                        <button class="btn btn-sm btn-teal" onclick="openEducationModal()">Add</button>
                    </div>

                    <div id="educationContainer"></div>
                </div>

            </div>
        </div>
    </div>
    </div>

    <!-- Experience Modal -->
    <div class="modal fade" id="experienceModal">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header bg-cyan-color text-white">
                    <h5>Experience</h5>
                </div>

                <div class="modal-body">

                    <input type="hidden" id="expId">

                    <input class="form-control mb-2" id="jobTitle" placeholder="Job Title">

                    <input class="form-control mb-2" id="companyName" placeholder="Company">

                    <select class="form-control mb-2" id="employmentType">
                        <option>FULL TIME</option>
                        <option>PART TIME</option>
                        <option>INTERNSHIP</option>
                    </select>

                    <label>Start Date</label>
                    <input type="date" class="form-control mb-2" id="startDate">

                    <label>End Date</label>
                    <input type="date" class="form-control mb-2" id="endDate">

                    <div class="form-check">
                        <input type="checkbox" id="currentJob" class="form-check-input">
                        <label>Current Job</label>
                    </div>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-teal w-100" onclick="saveExperience()">
                        Save
                    </button>
                </div>

            </div>
        </div>
    </div>


    <!-- -------------Education Modal----------------- -->
    <div class="modal fade" id="educationModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-cyan-color text-white">
                    <h5 class="modal-title" id="educationModalTitle">Add Education</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="educationId">
                    <input type="text" id="boardName" class="form-control mb-2" placeholder="University /Board Name">

                    <input type="text" id="degree" class="form-control mb-2" placeholder="Degree">

                    <input type="text" id="specialization" class="form-control mb-2" placeholder="Specialization">

                    <input type="text" id="institute" class="form-control mb-2" placeholder="Institute Name">

                    <input type="date" id="eduStart" class="form-control mb-2">

                    <input type="date" id="eduEnd" class="form-control mb-2">

                    <input type="text" id="percentage" class="form-control mb-2" placeholder="Percentage">

                </div>

                <div class="modal-footer">
                    <button class="btn btn-teal w-100" onclick="saveEducation()">Save</button>
                </div>

            </div>
        </div>
    </div>



    <!-- -------------------------Skill Modal------------ -->
    <div class="modal fade" id="skillModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 id="skillModalTitle">Add Skill</h5>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="skillId">
                    <input type="text" id="skillName" class="form-control" placeholder="Skill Name">
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-teal" onclick="saveSkill()">Save</button>
                </div>
            </div>
        </div>
    </div>


    <!-- -----------------Address Modal---------------------------- -->
    <div class="modal fade" id="addressModal">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header bg-cyan-color text-white">
                    <h5>Edit Address</h5>
                    <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <input id="addrLine1" class="form-control mb-2" placeholder="Address Line 1">

                    <input id="addrLine2" class="form-control mb-2" placeholder="Address Line 2">

                    <input id="addrCity" class="form-control mb-2" placeholder="City">

                    <input id="addrState" class="form-control mb-2" placeholder="State">

                    <input id="addrCountry" class="form-control mb-2" placeholder="Country">

                    <input id="addrPincode" class="form-control mb-2" placeholder="Pincode">

                </div>

                <div class="modal-footer">


                    <button class="btn btn-teal" onclick="saveAddress()">
                        Save
                    </button>
                </div>

            </div>
        </div>
    </div>
    <script>

        /* SIDEBAR */

        function openSidebar() {

            document.getElementById("sidebar").classList.add("active");
            document.getElementById("sidebarOverlay").classList.add("active");

        }

        function closeSidebar() {

            document.getElementById("sidebar").classList.remove("active");
            document.getElementById("sidebarOverlay").classList.remove("active");

        }



        /* SEARCH MODAL */

        function openSearchModal() {

            document.getElementById("searchOverlay").classList.add("active");

        }

        function outsideSearchClick(e) {

            if (e.target.id === "searchOverlay") {

                document.getElementById("searchOverlay").classList.remove("active");

            }

        }



        /* PROFILE DROPDOWN */

        function toggleProfileMenu(e) {

            e.stopPropagation();

            document
                .getElementById("profileDropdown")
                .classList.toggle("show");

        }


        /* CLOSE ON OUTSIDE CLICK */

        document.addEventListener("click", function () {

            document
                .getElementById("profileDropdown")
                .classList.remove("show");

        });

    </script>

    <script src="../config.js"></script>
    <script src="/assets/js/bootstrap.js"></script>
    <script src="/assets/js/profileUpdate.js"></script>

</body>

</html>
